<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PIP Shadow Overlay</title>
<style>
	* { margin: 0; padding: 0; box-sizing: border-box; }
	html, body {
		width: 100%; height: 100%;
		margin: 0;
		overflow: visible;
		background: transparent !important;
		background-color: rgba(0,0,0,0) !important;
	}
	#root {
		position: absolute;
		inset: 0;
		pointer-events: none;
		overflow: visible;
	}
	/* Shadow illusion only in mat bands — no box-shadow on inner-sized box (blooms onto video). */
	.sm {
		position: absolute;
		pointer-events: none;
	}
	/* Horizontal extent matches inner PIP only — full-width bottom/top bands spill shadow under the side margins (e.g. bottom-left). */
	.sm-t {
		top: 0;
		left: calc(var(--il) * 100%);
		width: calc(var(--iw) * 100%);
		height: calc(var(--it) * 100%);
	}
	.sm-b {
		bottom: 0;
		left: calc(var(--il) * 100%);
		width: calc(var(--iw) * 100%);
		height: calc((1 - var(--it) - var(--ih)) * 100%);
	}
	.sm-l {
		left: 0; top: calc(var(--it) * 100%);
		width: calc(var(--il) * 100%);
		height: calc(var(--ih) * 100%);
	}
	.sm-r {
		right: 0; top: calc(var(--it) * 100%);
		width: calc((1 - var(--il) - var(--iw)) * 100%);
		height: calc(var(--ih) * 100%);
	}
</style>
</head>
<body>
<div id="root" style="visibility:hidden">
	<div class="sm sm-t"></div>
	<div class="sm sm-b"></div>
	<div class="sm sm-l"></div>
	<div class="sm sm-r"></div>
</div>
<script>
(function () {
	var root = document.getElementById('root')
	var state = {
		blur: 20,
		offsetX: 5,
		offsetY: 5,
		color: 'rgba(0,0,0,0.6)',
		spread: 0,
		inner: null,
	}

	function clamp01(x) {
		var n = Number(x)
		return isFinite(n) ? Math.max(0, Math.min(1, n)) : 0
	}

	function readInner(d) {
		if (!d || !d.inner || typeof d.inner !== 'object') return null
		return { l: clamp01(d.inner.l), t: clamp01(d.inner.t), w: clamp01(d.inner.w), h: clamp01(d.inner.h) }
	}

	function hasMargin(inn) {
		if (!inn) return false
		return inn.t > 1e-4 || inn.l > 1e-4 || inn.l + inn.w < 1 - 1e-4 || inn.t + inn.h < 1 - 1e-4
	}

	/** Mirrors pip-overlay outsetPxForPipOverlay shadow: blur + max(|ox|,|oy|) + spread + 2, floor 12 */
	function shadowOutsetPx() {
		var b = Math.max(0, state.blur || 0)
		var ox = Math.abs(state.offsetX || 0)
		var oy = Math.abs(state.offsetY || 0)
		var sp = Math.max(0, state.spread || 0)
		return Math.max(12, b + Math.max(ox, oy) + sp + 2)
	}

	function resolveEffectiveInner() {
		var inn = state.inner
		if (inn && hasMargin(inn)) return inn
		var outp = shadowOutsetPx()
		var rw = Math.max(1, root.clientWidth)
		var rh = Math.max(1, root.clientHeight)
		var l = outp / rw
		var t = outp / rh
		var w = 1 - 2 * l
		var h = 1 - 2 * t
		if (!(w > 1e-6 && h > 1e-6)) return null
		return { l: l, t: t, w: w, h: h }
	}

	function parseShadowColor() {
		var c = String(state.color || 'rgba(0,0,0,0.6)')
		var m = c.match(/rgba?\(\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*([\d.]+)(?:\s*,\s*([\d.]+))?\s*\)/i)
		if (m) {
			return { r: +m[1], g: +m[2], b: +m[3], a: m[4] != null ? +m[4] : 1 }
		}
		var hex = c.match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/i)
		if (hex) {
			var h = hex[1]
			if (h.length === 3) {
				return { r: parseInt(h[0] + h[0], 16), g: parseInt(h[1] + h[1], 16), b: parseInt(h[2] + h[2], 16), a: 1 }
			}
			return { r: parseInt(h.slice(0, 2), 16), g: parseInt(h.slice(2, 4), 16), b: parseInt(h.slice(4, 6), 16), a: 1 }
		}
		return { r: 0, g: 0, b: 0, a: 0.6 }
	}

	function apply() {
		var eff = resolveEffectiveInner()
		if (!eff || !hasMargin(eff)) {
			root.style.visibility = 'hidden'
			return
		}
		root.style.visibility = 'visible'
		root.style.setProperty('--il', String(eff.l))
		root.style.setProperty('--it', String(eff.t))
		root.style.setProperty('--iw', String(eff.w))
		root.style.setProperty('--ih', String(eff.h))

		var col = parseShadowColor()
		var b = Math.max(0, state.blur || 0)
		var baseA = Math.min(0.85, col.a * (0.35 + b / 80))
		var fade = 'rgba(' + col.r + ',' + col.g + ',' + col.b + ','
		var ox = state.offsetX || 0
		var oy = state.offsetY || 0

		/* Darken along the inner-facing edge of each mat band; bias strength by offset sign. */
		var aTop = Math.max(0.06, baseA * (oy <= 0 ? 1.12 : 0.42))
		var aBot = Math.max(0.06, baseA * (oy >= 0 ? 1.12 : 0.42))
		var aLft = Math.max(0.06, baseA * (ox <= 0 ? 1.08 : 0.42))
		var aRgt = Math.max(0.06, baseA * (ox >= 0 ? 1.08 : 0.42))

		/* sm-t: inner is below strip — fade in toward bottom. sm-b: inner above — strong at top. */
		root.querySelector('.sm-t').style.background =
			'linear-gradient(to bottom, ' + fade + '0), ' + fade + aTop + ')'
		root.querySelector('.sm-b').style.background =
			'linear-gradient(to bottom, ' + fade + aBot + '), ' + fade + '0)'
		root.querySelector('.sm-l').style.background =
			'linear-gradient(to right, ' + fade + '0), ' + fade + aLft + ')'
		root.querySelector('.sm-r').style.background =
			'linear-gradient(to left, ' + fade + aRgt + '), ' + fade + '0)'

		/* Fade band ends where two mats meet at inner corners — avoids visibly doubled shadow at intersections. */
		var mkH = 'linear-gradient(to right, transparent 0%, #000 10%, #000 90%, transparent 100%)'
		var mkV = 'linear-gradient(to bottom, transparent 0%, #000 10%, #000 90%, transparent 100%)'
		;['webkitMaskImage', 'maskImage'].forEach(function (k) {
			root.querySelector('.sm-t').style[k] = mkH
			root.querySelector('.sm-b').style[k] = mkH
			root.querySelector('.sm-l').style[k] = mkV
			root.querySelector('.sm-r').style[k] = mkV
		})
	}

	function scheduleLayout() {
		if (typeof requestAnimationFrame === 'function') {
			requestAnimationFrame(function () { apply() })
		} else {
			setTimeout(apply, 0)
		}
	}

	if (typeof ResizeObserver !== 'undefined') {
		try {
			new ResizeObserver(scheduleLayout).observe(root)
		} catch (e) {}
	}

	window['play'] = function () {}
	window['stop'] = function () {}
	window['next'] = function () {}

	window['update'] = function (raw) {
		try {
			var d = typeof raw === 'string' ? JSON.parse(raw.replace(/\\"/g, '"').replace(/^"|"$/g, '')) : raw
			if (!d) return
			if (d.blur != null) state.blur = parseFloat(d.blur) || 0
			if (d.offsetX != null) state.offsetX = parseFloat(d.offsetX) || 0
			if (d.offsetY != null) state.offsetY = parseFloat(d.offsetY) || 0
			if (d.color != null) state.color = String(d.color)
			if (d.spread != null) state.spread = parseFloat(d.spread) || 0
			state.inner = readInner(d)
			apply()
			scheduleLayout()
		} catch (e) {
			console.warn('pip_shadow update:', e)
		}
	}

	apply()
	scheduleLayout()
})()
</script>
</body>
</html>
