<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Multiview overlay</title>
	<style>
		@font-face { font-family: 'Rewir'; src: url('../web/fonts/Rewir-Light.woff') format('woff'); font-weight: 300; font-style: normal; font-display: swap; }
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body { width: 100%; height: 100%; overflow: hidden; background: transparent !important; background-color: rgba(0,0,0,0) !important; font-family: 'Rewir', system-ui, -apple-system, 'Segoe UI', sans-serif; }
		#container { position: absolute; inset: 0; pointer-events: none; background: transparent !important; }
		.cell { position: absolute; border: 3px solid; background: transparent !important; }
		.cell .label { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); color: #fff; font: 12px/1.5 'Rewir', system-ui, -apple-system, 'Segoe UI', sans-serif; padding: 2px 6px; }
		.cell.pgm { border-color: #e63946; }
		.cell.prv { border-color: #2a9d8f; }
		.cell.decklink { border-color: #457b9d; }
		.cell.ndi { border-color: #e9c46a; }
		.cell.route { border-color: #8b949e; }
	</style>
</head>
<body>
	<div id="container"></div>
	<script>
		window['play'] = function() { /* CasparCG calls play(); no-op */ }
		function update(raw) {
			let data
			try {
				if (typeof raw === 'string') {
					let s = raw.trim()
					if (!s) return
					if (s.indexOf('\\"') !== -1) s = s.replace(/\\"/g, '"')
					if (s.charAt(0) === '"' && s.length > 1 && s.charAt(s.length - 1) === '"') s = s.slice(1, -1)
					if (s.charAt(0) === '"') { s = s.slice(1).replace(/\\"/g, '"'); s = s.replace(/"\s*$/, '') }
					data = JSON.parse(s)
				} else if (raw && typeof raw === 'object') {
					data = raw
				} else return
			} catch (e) { return }
			const cells = data?.cells || []
			const c = document.getElementById('container')
			c.innerHTML = ''
			cells.forEach(function (cell) {
				const div = document.createElement('div')
				div.className = 'cell ' + (cell.type || '')
				div.style.left = (100 * (cell.x || 0)) + '%'
				div.style.top = (100 * (cell.y || 0)) + '%'
				div.style.width = (100 * (cell.w || 0)) + '%'
				div.style.height = (100 * (cell.h || 0)) + '%'
				const lbl = document.createElement('div')
				lbl.className = 'label'
				lbl.textContent = cell.label || cell.id || ''
				div.appendChild(lbl)
				c.appendChild(div)
			})
		}
		window['update'] = update
	</script>
</body>
</html>
