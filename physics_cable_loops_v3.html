
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#canvas { width: 100%; display: block; }
#toolbar {
  display: flex; align-items: center; gap: 10px; padding: 9px 14px;
  border-bottom: 0.5px solid var(--color-border-tertiary);
  font-size: 12px; color: var(--color-text-secondary); flex-wrap: wrap;
}
.btn { padding: 4px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); font-size: 12px; cursor: pointer; }
.btn:hover { background: var(--color-background-secondary); }
.btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
.slider-wrap { display: flex; align-items: center; gap: 8px; }
#mess-val { min-width: 52px; font-weight: 500; color: var(--color-text-primary); }
#hint { margin-left: auto; opacity: .65; font-size: 11px; }
</style>
<div id="toolbar">
  <button class="btn active" id="btn-connect" onclick="setMode('connect')">Connect</button>
  <button class="btn" id="btn-move" onclick="setMode('move')">Move nodes</button>
  <button class="btn" onclick="addNodeRandom()">+ Node</button>
  <button class="btn" onclick="cables=[]">Clear cables</button>
  <div class="slider-wrap">
    <label>Messiness</label>
    <input type="range" id="mess-slider" min="0" max="100" value="0" style="width:120px" oninput="setMess(+this.value)">
    <span id="mess-val">0 loops</span>
  </div>
  <span id="hint">Click a port → click another to connect</span>
</div>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const C = {
  node: isDark?'#3a3936':'#ffffff', nodeBorder: isDark?'#5a5955':'#c0beb4',
  nodeActive: isDark?'#1a3a5c':'#e6f1fb', nodeBorderActive: isDark?'#4a8ecc':'#3b8bd4',
  port: isDark?'#4a4946':'#e8e6df', portBorder: isDark?'#7a7874':'#a8a69f',
  portHover:'#3B8BD4', portConn:'#3B8BD4',
  text: isDark?'#c2c0b6':'#3d3d3a', textSub: isDark?'#7a7874':'#888780',
  cable: isDark?'#9a9890':'#706e68',
  bg: isDark?'#1c1c1a':'#f8f7f4', grid: isDark?'#252523':'#ece8df',
};
let mode='connect', nodes=[], cables=[];
let draggingNode=null, dragOffset={x:0,y:0};
let connectFrom=null, mousePos={x:200,y:200}, hoveredPort=null;
let nodeId=0, numLoops=0;
const NODE_W=130, NODE_H=68, PORT_R=7;

function setMess(v){
  numLoops=v;
  document.getElementById('mess-val').textContent=v+(v===1?' loop':' loops');
}
function resize(){
  const w=canvas.parentElement.clientWidth;
  canvas.width=w*devicePixelRatio; canvas.height=480*devicePixelRatio;
  canvas.style.height='480px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
function addNode(x,y){ nodes.push({id:++nodeId,x,y,label:'Node '+nodeId,ports:[{side:'left',type:'in'},{side:'right',type:'out'}]}); }
function addNodeRandom(){ const cw=canvas.width/devicePixelRatio; addNode(80+Math.random()*(cw-260),60+Math.random()*300); }
function getPortPos(node,port){ return{x:port.side==='left'?node.x:node.x+NODE_W,y:node.y+NODE_H/2}; }
function getHoveredPort(mx,my){
  for(let i=nodes.length-1;i>=0;i--)
    for(const port of nodes[i].ports){
      const p=getPortPos(nodes[i],port);
      if(Math.hypot(mx-p.x,my-p.y)<PORT_R+7) return{node:nodes[i],port};
    }
  return null;
}
function srand(n,seed){ const v=Math.sin(n*127.1+seed*311.7)*43758.5453; return v-Math.floor(v); }

// Build cable as explicit waypoints then verlet-settle
function buildCable(x1,y1,x2,y2,loops,seed){
  const loopR = 32; // fixed loop radius — visible and consistent
  const STEPS_PER_LOOP = 40; // points per full circle — enough for smooth circle
  const APPROACH_STEPS = 14;

  const straightDist = Math.hypot(x2-x1,y2-y1)||1;
  const loopT  = 0.3 + srand(0,seed)*0.4;
  const loopCX = x1+(x2-x1)*loopT;
  const loopCY = y1+(y2-y1)*loopT;
  const loopSide = srand(1,seed)>0.5 ? 1 : -1;

  const cDx=(x2-x1)/straightDist, cDy=(y2-y1)/straightDist;
  const px=-cDy*loopSide, py=cDx*loopSide;

  // Circle centre is offset perpendicular
  const circCX = loopCX + px*loopR;
  const circCY = loopCY + py*loopR;
  const entryAngle = Math.atan2(loopCY-circCY, loopCX-circCX);
  const entX = circCX + Math.cos(entryAngle)*loopR;
  const entY = circCY + Math.sin(entryAngle)*loopR;

  // Build waypoint array explicitly
  const wp = [];

  // 1. Approach: start → entry point
  for(let i=0;i<=APPROACH_STEPS;i++){
    const t=i/APPROACH_STEPS;
    wp.push({x:x1+(entX-x1)*t, y:y1+(entY-y1)*t});
  }

  // 2. Loops: each loop is a full 2π traversal of the circle
  //    We generate loops*STEPS_PER_LOOP points, each advancing by 2π/STEPS_PER_LOOP
  //    Total angle swept = loops * 2π  →  exactly `loops` full rotations
  const totalLoopPoints = loops * STEPS_PER_LOOP;
  for(let i=1;i<=totalLoopPoints;i++){
    const angle = entryAngle + loopSide * (i / STEPS_PER_LOOP) * 2 * Math.PI;
    wp.push({x: circCX + Math.cos(angle)*loopR, y: circCY + Math.sin(angle)*loopR});
  }

  // 3. Exit: entry point → end
  for(let i=1;i<=APPROACH_STEPS;i++){
    const t=i/APPROACH_STEPS;
    wp.push({x:entX+(x2-entX)*t, y:entY+(y2-entY)*t});
  }

  // Arc-length resample to N evenly spaced verlet points
  // N must be enough for all the loop detail
  const N = APPROACH_STEPS*2 + totalLoopPoints + 4;

  const wpLens=[0];
  for(let i=1;i<wp.length;i++)
    wpLens.push(wpLens[i-1]+Math.hypot(wp[i].x-wp[i-1].x,wp[i].y-wp[i-1].y));
  const totalLen=wpLens[wpLens.length-1];

  const pts=[];
  for(let i=0;i<=N;i++){
    const target=(i/N)*totalLen;
    let seg=0;
    while(seg<wpLens.length-2&&wpLens[seg+1]<target) seg++;
    const span=wpLens[seg+1]-wpLens[seg]||1;
    const t=(target-wpLens[seg])/span;
    pts.push({
      x:wp[seg].x+(wp[seg+1].x-wp[seg].x)*t,
      y:wp[seg].y+(wp[seg+1].y-wp[seg].y)*t,
    });
  }

  const segLen=totalLen/N;

  // Verlet physics — gentle gravity, many iters for stability with many loops
  const gravity=0.2;
  const ITERS=Math.min(80 + loops*4, 300);
  for(let iter=0;iter<ITERS;iter++){
    for(let i=1;i<N;i++) pts[i].y+=gravity;
    for(let pass=0;pass<3;pass++){
      for(let i=0;i<N;i++){
        const a=pts[i],b=pts[i+1];
        const ddx=b.x-a.x,ddy=b.y-a.y;
        const d=Math.hypot(ddx,ddy)||0.001;
        const corr=(d-segLen)/d*0.5;
        if(i>0)   {a.x+=ddx*corr;a.y+=ddy*corr;}
        if(i<N-1) {b.x-=ddx*corr;b.y-=ddy*corr;}
      }
    }
    pts[0].x=x1;pts[0].y=y1;
    pts[N].x=x2;pts[N].y=y2;
  }
  return pts;
}

const cableCache=new Map();
function getOrBuild(cable,fp,tp){
  const key=`${fp.x.toFixed(1)},${fp.y.toFixed(1)},${tp.x.toFixed(1)},${tp.y.toFixed(1)},${numLoops}`;
  const c=cableCache.get(cable.id);
  if(c?.key===key) return c.pts;
  const pts=buildCable(fp.x,fp.y,tp.x,tp.y,numLoops,cable.seed);
  cableCache.set(cable.id,{key,pts});
  return pts;
}

function drawPts(pts,color,lw,alpha){
  if(!pts?.length) return;
  ctx.save();ctx.globalAlpha=alpha??1;
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.stroke();ctx.restore();
}

function drawNode(node){
  const isActive=connectFrom?.node.id===node.id;
  ctx.save();
  ctx.beginPath();ctx.roundRect(node.x,node.y,NODE_W,NODE_H,10);
  ctx.fillStyle=isActive?C.nodeActive:C.node;ctx.fill();
  ctx.strokeStyle=isActive?C.nodeBorderActive:C.nodeBorder;ctx.lineWidth=isActive?1.5:0.5;ctx.stroke();
  ctx.fillStyle=C.text;ctx.font='500 13px var(--font-sans,sans-serif)';ctx.textAlign='center';
  ctx.fillText(node.label,node.x+NODE_W/2,node.y+NODE_H/2-5);
  ctx.fillStyle=C.textSub;ctx.font='11px var(--font-sans,sans-serif)';
  ctx.fillText(mode==='connect'?'click port to wire':'drag to move',node.x+NODE_W/2,node.y+NODE_H/2+11);
  for(const port of node.ports){
    const p=getPortPos(node,port);
    const isHov=hoveredPort?.node.id===node.id&&hoveredPort.port===port;
    const isConn=cables.some(c=>(c.fromNode===node.id&&c.fromPort===port)||(c.toNode===node.id&&c.toPort===port));
    ctx.beginPath();ctx.arc(p.x,p.y,PORT_R,0,Math.PI*2);
    ctx.fillStyle=isHov?C.portHover:isConn?C.portConn:C.port;ctx.fill();
    ctx.strokeStyle=isHov?C.portHover:isConn?'#1e6fa8':C.portBorder;ctx.lineWidth=1.5;ctx.stroke();
    if(isHov||isConn){ctx.beginPath();ctx.arc(p.x,p.y,PORT_R-3,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();}
  }
  ctx.restore();
}

function draw(){
  const cw=canvas.width/devicePixelRatio,ch=canvas.height/devicePixelRatio;
  ctx.clearRect(0,0,cw,ch);
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,cw,ch);
  ctx.save();ctx.strokeStyle=C.grid;ctx.lineWidth=0.5;
  for(let x=0;x<cw;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,ch);ctx.stroke();}
  for(let y=0;y<ch;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cw,y);ctx.stroke();}
  ctx.restore();

  for(const cable of cables){
    const fn=nodes.find(n=>n.id===cable.fromNode),tn=nodes.find(n=>n.id===cable.toNode);
    if(!fn||!tn) continue;
    const fp=getPortPos(fn,cable.fromPort),tp=getPortPos(tn,cable.toPort);
    const pts=getOrBuild(cable,fp,tp);
    drawPts(pts,C.cable,5,0.08);
    drawPts(pts,C.cable,2,1);
  }

  if(connectFrom&&mode==='connect'){
    const fp=getPortPos(connectFrom.node,connectFrom.port);
    const pts=buildCable(fp.x,fp.y,mousePos.x,mousePos.y,numLoops,99);
    drawPts(pts,'#3B8BD4',6,0.12);drawPts(pts,'#3B8BD4',2,0.6);
  }
  for(const node of nodes) drawNode(node);
  requestAnimationFrame(draw);
}

function setMode(m){
  mode=m;connectFrom=null;
  document.getElementById('btn-connect').classList.toggle('active',m==='connect');
  document.getElementById('btn-move').classList.toggle('active',m==='move');
  document.getElementById('hint').textContent=m==='connect'?'Click a port → click another to connect':'Drag nodes to reposition';
  canvas.style.cursor=m==='move'?'grab':'default';
}
function getXY(e){const r=canvas.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
canvas.addEventListener('mousemove',e=>{
  const{x,y}=getXY(e);mousePos={x,y};
  if(draggingNode){draggingNode.x=x-dragOffset.x;draggingNode.y=y-dragOffset.y;return;}
  hoveredPort=mode==='connect'?getHoveredPort(x,y):null;
  canvas.style.cursor=hoveredPort?'crosshair':draggingNode?'grabbing':mode==='move'?'grab':'default';
});
canvas.addEventListener('mousedown',e=>{
  const{x,y}=getXY(e);
  if(mode==='move'){
    for(let i=nodes.length-1;i>=0;i--){
      const n=nodes[i];
      if(x>=n.x&&x<=n.x+NODE_W&&y>=n.y&&y<=n.y+NODE_H){draggingNode=n;dragOffset={x:x-n.x,y:y-n.y};nodes.splice(i,1);nodes.push(n);return;}
    }
    return;
  }
  const hp=getHoveredPort(x,y);
  if(!hp){connectFrom=null;return;}
  if(!connectFrom){connectFrom=hp;return;}
  if(connectFrom.node.id!==hp.node.id){
    const dup=cables.some(c=>(c.fromNode===connectFrom.node.id&&c.fromPort===connectFrom.port&&c.toNode===hp.node.id&&c.toPort===hp.port)||(c.fromNode===hp.node.id&&c.fromPort===hp.port&&c.toNode===connectFrom.node.id&&c.toPort===connectFrom.port));
    if(!dup) cables.push({id:Date.now()+Math.random(),seed:Math.random()*999,fromNode:connectFrom.node.id,fromPort:connectFrom.port,toNode:hp.node.id,toPort:hp.port});
  }
  connectFrom=null;
});
canvas.addEventListener('mouseup',()=>{draggingNode=null;});

addNode(70,140);addNode(320,80);addNode(320,250);addNode(560,165);
let cid=1000;
cables.push({id:cid++,seed:42,  fromNode:1,fromPort:nodes[0].ports[1],toNode:2,toPort:nodes[1].ports[0]});
cables.push({id:cid++,seed:137, fromNode:1,fromPort:nodes[0].ports[1],toNode:3,toPort:nodes[2].ports[0]});
cables.push({id:cid++,seed:271, fromNode:2,fromPort:nodes[1].ports[1],toNode:4,toPort:nodes[3].ports[0]});
cables.push({id:cid++,seed:88,  fromNode:3,fromPort:nodes[2].ports[1],toNode:4,toPort:nodes[3].ports[0]});
resize();draw();
window.addEventListener('resize',resize);
</script>
